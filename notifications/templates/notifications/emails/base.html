<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScooterShop{% endblock %}</title>
    <style>
        body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
        table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
        img { -ms-interpolation-mode: bicubic; border: 0; height: auto; line-height: 100%; outline: none; text-decoration: none; }
        table { border-collapse: collapse !important; }
        body { height: 100% !important; margin: 0 !important; padding: 0 !important; width: 100% !important; background-color: #f5f4f3; }
    </style>
</head>
<body style="background-color: #f5f4f3; margin: 0 !important; padding: 0 !important;">

    <!-- Hidden preheader -->
    <div style="display: none; max-height: 0; overflow: hidden; font-size: 1px; color: #f5f4f3;">
        {% block preheader %}{% endblock %}
    </div>

    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f5f4f3;">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 560px;">

                    <!-- HEADER -->
                    <tr>
                        <td align="center" style="background-color: #1c1917; padding: 28px 40px; border-radius: 6px 6px 0 0;">
                            <a href="https://www.scootershop.com.au" target="_blank" style="text-decoration: none;">
                                <img src="https://www.scootershop.com.au/logo-512x512.png" alt="ScooterShop" width="48" style="display: block; width: 48px; margin: 0 auto 12px auto; border: 0;">
                                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: bold; color: #fbbf24; text-transform: uppercase; letter-spacing: 0.2em; text-decoration: none;">ScooterShop</span>
                            </a>
                        </td>
                    </tr>

                    <!-- CONTENT -->
                    <tr>
                        <td style="background-color: #ffffff; padding: 40px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; color: #1c1917; line-height: 26px; border-radius: 0 0 6px 6px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>

                    <!-- FOOTER -->
                    <tr>
                        <td align="center" style="padding-top: 24px; font-family: Arial, Helvetica, sans-serif; font-size: 12px; color: #78716c; line-height: 18px;">
                            <a href="https://www.scootershop.com.au" target="_blank" style="color: #78716c; text-decoration: none;">scootershop.com.au</a>
                            &nbsp;&middot;&nbsp;
                            Allbikes &amp; Scooters, Dianella WA
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>
</html>
